<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
        }
        .page {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 0 auto;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            text-align: center;
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 20px;
        }
        .titulo {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .localizacao {
            font-size: 14px;
            color: #555;
        }
        .content {
            display: flex;
            gap: 30px;
            flex: 1;
        }
        .info-section {
            flex: 1;
        }
        .image-section {
            flex: 0 0 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-section img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .info-group {
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #3498db;
            border-radius: 4px;
        }
        .info-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 20px;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="titulo">{{ titulo }}</div>
            <div class="localizacao">{{ cidade }} / {{ estado }}</div>
        </div>

        <div class="content">
            <div class="info-section">
                <div class="info-group">
                    <div class="info-label">Praça Única</div>
                    <div class="info-value">{{ praca1_valor }}</div>
                </div>
            </div>

            <div class="image-section">
                {% if imagem_url %}
                <img src="{{ imagem_url }}" alt="{{ titulo }}">
                {% else %}
                <div style="color: #ccc; text-align: center;">Imagem não disponível</div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
